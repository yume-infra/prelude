name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write
  pull-requests: write

jobs:
  release:
    name: Version or publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.15.0
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prod=false

      - name: Expose TypeScript-Go binary
        run: |
          tsgo_path="$(pnpm --filter @sayoriqwq/prelude-contract exec effect-tsgo get-exe-path)"
          ln -sf "$tsgo_path" packages/harness-contract/node_modules/.bin/tsgo
          ln -sf "$tsgo_path" apps/cli/node_modules/.bin/tsgo

      - name: Create version PR
        id: changesets
        uses: changesets/action@v1
        with:
          version: pnpm version-packages
          commit: 'chore: version packages'
          title: 'chore: version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to npm
        if: steps.changesets.outputs.hasChangesets == 'false'
        run: pnpm release

      - name: Push release tags
        if: steps.changesets.outputs.hasChangesets == 'false'
        run: git push --follow-tags
