name: CI

on:
  push:
    branches:
      - main
      - generated/latest
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  flake:
    name: Flake (${{ matrix.os }})
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - ubuntu-24.04-arm
          - macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Install Nix
        uses: DeterminateSystems/determinate-nix-action@v3

      - name: Setup Nix cache
        uses: DeterminateSystems/flakehub-cache-action@main

      - name: Build flake package
        run: nix build .#effect-tsgo --no-write-lock-file

  test:
    name: Test
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      matrix:
        os: [ubuntu-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: false

      - name: Cache Go build
        uses: actions/cache@v6
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: go-build-ci-${{ runner.os }}-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            go-build-ci-${{ runner.os }}-

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup repo (submodules, patches, generated files)
        run: pnpm setup-repo --ci

      - name: Check
        run: pnpm check

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

      - name: Lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.9
          args: ./...
        env:
          CGO_ENABLED: "0"
