name: Refresh Flake Hash

on:
  workflow_dispatch:
    inputs:
      target_ref:
        description: Branch or ref to refresh
        required: false
        type: string
  workflow_call:
    inputs:
      target_ref:
        description: Branch or ref to refresh
        required: true
        type: string
  pull_request_target:
    types: [opened, reopened, synchronize]
    paths:
      - flake.nix
      - flake.lock
      - go.mod
      - go.sum
      - go.work
      - go.work.sum
      - typescript-go
      - _patches/**
      - _tools/update-flake-vendor-hash.sh
      - .github/workflows/ci.yml
      - .github/workflows/update-typescript-go.yml

concurrency:
  group: refresh-flake-hash-${{ github.event.pull_request.number || inputs.target_ref || github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  refresh:
    name: Refresh flake hash
    if: github.event_name != 'pull_request_target' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout PR branch
        if: github.event_name == 'pull_request_target'
        uses: actions/checkout@v7
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}
          submodules: recursive

      - name: Checkout requested branch
        if: github.event_name != 'pull_request_target' && inputs.target_ref != ''
        uses: actions/checkout@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ inputs.target_ref }}
          submodules: recursive

      - name: Checkout current branch
        if: github.event_name != 'pull_request_target' && inputs.target_ref == ''
        uses: actions/checkout@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.ref_name }}
          submodules: recursive

      - name: Install Nix
        uses: DeterminateSystems/determinate-nix-action@v3

      - name: Refresh flake hash
        run: ./_tools/update-flake-vendor-hash.sh

      - name: Commit refreshed hash
        run: |
          if git diff --quiet -- flake.nix flake.lock; then
            echo "flake hash already up to date"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add flake.nix flake.lock
          git commit -m "Refresh flake vendor hash"

          branch_ref="${{ inputs.target_ref || github.event.pull_request.head.ref || github.ref_name }}"
          git push origin "HEAD:${branch_ref}"
