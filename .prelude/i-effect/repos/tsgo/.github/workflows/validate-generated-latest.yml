name: Validate Generated Latest

on:
  workflow_call:
    inputs:
      head_sha:
        description: Generated latest PR head SHA to validate
        required: true
        type: string
      pr_number:
        description: Generated latest PR number
        required: true
        type: string
  workflow_dispatch:
    inputs:
      head_sha:
        description: Generated latest PR head SHA to validate
        required: true
        type: string
      pr_number:
        description: Generated latest PR number
        required: true
        type: string

permissions: {}

jobs:
  validate:
    name: Validate generated latest
    if: github.repository_owner == 'Effect-TS'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      checks: write
      contents: read

    steps:
      - name: Create PR validation check
        id: create_check
        uses: actions/github-script@v9
        env:
          HEAD_SHA: ${{ inputs.head_sha }}
          PR_NUMBER: ${{ inputs.pr_number }}
        with:
          script: |
            const { data } = await github.rest.checks.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              name: 'Validate generated latest PR',
              head_sha: process.env.HEAD_SHA,
              status: 'in_progress',
              output: {
                title: `Validation started for PR #${process.env.PR_NUMBER}`,
                summary: 'Generated latest PR validation is running.',
              },
            })

            core.setOutput('check_run_id', String(data.id))

      - name: Checkout generated latest PR branch
        uses: actions/checkout@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ inputs.head_sha }}
          submodules: recursive

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: false

      - name: Cache Go build
        uses: actions/cache@v6
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: go-build-validate-generated-latest-${{ runner.os }}-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            go-build-validate-generated-latest-${{ runner.os }}-

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup generated latest repo
        run: pnpm setup-repo --ci

      - name: Validate check
        id: validate_check
        continue-on-error: true
        run: pnpm check

      - name: Validate build
        id: validate_build
        continue-on-error: true
        run: pnpm build

      - name: Validate test
        id: validate_test
        continue-on-error: true
        run: pnpm test

      - name: Validate lint
        id: validate_lint
        continue-on-error: true
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.9
          args: ./...
        env:
          CGO_ENABLED: "0"

      - name: Complete PR validation check
        if: always()
        uses: actions/github-script@v9
        env:
          CHECK_RUN_ID: ${{ steps.create_check.outputs.check_run_id }}
          PR_NUMBER: ${{ inputs.pr_number }}
          CHECK_OUTCOME: ${{ steps.validate_check.outcome }}
          BUILD_OUTCOME: ${{ steps.validate_build.outcome }}
          TEST_OUTCOME: ${{ steps.validate_test.outcome }}
          LINT_OUTCOME: ${{ steps.validate_lint.outcome }}
        with:
          script: |
            const success =
              process.env.CHECK_OUTCOME === 'success' &&
              process.env.BUILD_OUTCOME === 'success' &&
              process.env.TEST_OUTCOME === 'success' &&
              process.env.LINT_OUTCOME === 'success'

            await github.rest.checks.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              check_run_id: Number(process.env.CHECK_RUN_ID),
              status: 'completed',
              conclusion: success ? 'success' : 'failure',
              output: {
                title: `Validation result for PR #${process.env.PR_NUMBER}`,
                summary: success ? 'Generated latest PR validation passed.' : 'Generated latest PR validation failed.',
              },
            })
