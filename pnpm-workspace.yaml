allowBuilds:
  esbuild: true
  msgpackr-extract: true
autoInstallPeers: true

catalogMode: manual

cleanupUnusedCatalogs: true

dedupeDirectDeps: true

optimisticRepeatInstall: true

resolvePeersFromWorkspaceRoot: true

shellEmulator: true

trustPolicy: no-downgrade

trustPolicyExclude:
  - '@effect/platform-node@4.0.0-beta.92'
  - '@effect/platform-node-shared@4.0.0-beta.92'
  - '@effect/vitest@4.0.0-beta.92'
  - effect@4.0.0-beta.92

packages:
  - apps/*
  - packages/*

overrides:
  '@effect/platform-node@4.0.0-beta.92>@effect/platform-node-shared': 4.0.0-beta.92

catalog:
  '@changesets/cli': ^2.31.0
  '@commitlint/cli': ^20.5.3
  '@commitlint/config-conventional': ^20.5.3
  '@effect/tsgo': 0.15.0
  '@effect/vitest': 4.0.0-beta.92
  '@types/node': 25.6.0
  '@types/semver': ^7.7.1
  '@typescript/native-preview': 7.0.0-dev.20260630.1
  effect: 4.0.0-beta.92
  execa: ^9.6.1
  husky: ^9.1.7
  import-meta-resolve: ^4.2.0
  jsonc-parser: ^3.3.1
  knip: ^6.12.0
  lint-staged: ^17.0.2
  semver: ^7.8.5
  taze: ^19.11.0
  tsdown: ^0.21.10
  tsx: ^4.21.0
  turbo: ^2.9.9
  typescript: 6.0.3
  vitest: ^4.1.8
  yaml: ^2.9.0

updateConfig:
  ignoreDependencies:
    - typescript

verifyDepsBeforeRun: error
