autoInstallPeers: true

catalogMode: manual

cleanupUnusedCatalogs: true

dedupeDirectDeps: true

optimisticRepeatInstall: true

resolvePeersFromWorkspaceRoot: true

shellEmulator: true

trustPolicy: no-downgrade

trustPolicyExclude:
  - '@effect/platform-node@4.0.0-beta.90'
  - '@effect/platform-node-shared@4.0.0-beta.90'
  - '@effect/vitest@4.0.0-beta.90'
  - effect@4.0.0-beta.90

packages:
  - apps/*
  - packages/*

overrides:
  '@effect/platform-node@4.0.0-beta.90>@effect/platform-node-shared': 4.0.0-beta.90

catalog:
  '@antfu/eslint-config': 8.2.0
  '@changesets/cli': ^2.31.0
  '@clack/prompts': ^1.3.0
  '@commitlint/cli': ^20.5.3
  '@commitlint/config-conventional': ^20.5.3
  '@effect/experimental': ^0.60.0
  '@effect/language-service': 0.86.2
  '@effect/opentelemetry': ^0.63.0
  '@effect/platform': ^0.96.1
  '@effect/platform-node': ^0.106.0
  '@effect/tsgo': 0.14.6
  '@effect/vitest': 4.0.0-beta.90
  '@opentelemetry/exporter-trace-otlp-http': ^0.217.0
  '@opentelemetry/sdk-trace-base': ^2.7.1
  '@opentelemetry/sdk-trace-node': ^2.7.1
  '@types/node': 25.6.0
  '@typescript/native-preview': 7.0.0-dev.20260624.1
  effect: ^3.21.2
  eslint: ^10.3.0
  execa: ^9.6.1
  husky: ^9.1.7
  knip: ^6.12.0
  lint-staged: ^17.0.2
  mri: ^1.2.0
  taze: ^19.11.0
  tsdown: ^0.21.10
  tsx: ^4.21.0
  turbo: ^2.9.9
  typescript: 6.0.3
  vitest: ^4.1.5

updateConfig:
  ignoreDependencies:
    - typescript

verifyDepsBeforeRun: error
peerDependencyRules:
  allowedVersions:
    '@effect/opentelemetry>@effect/platform': ^0.96.0
